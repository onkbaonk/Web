{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
<div class="card-header bg-dark text-white py-3" style="border-radius: 15px 15px 0 0;">
<h3>🛡⚙️ Admin Dashboard</h3>
<p class="opacity-75" style="color: var(--warna-muted);">Kelola data pengguna dan konten postingan secara terpusat.</p></div>
<div class="row mt-4">
<div class="col-md-4">  
<div class="card text-center shadow-sm">  
<div class="card-body">  
<h4>{{ user_count }}</h4>  
<p>Total Users</p>  
</div>  
</div>  
</div>
<div class="col-md-4">  
<div class="card text-center shadow-sm">  
<div class="card-body">  
<h4>{{ post_count }}</h4>  
<p>Total Posts</p>  
</div>  
</div>  
</div>  <div class="col-md-4">  
<div class="card text-center shadow-sm">  
<div class="card-body">  
<h4>{{ thread_count }}</h4>  
<p>Total Threads</p>  
</div>  
</div>  
</div>
</div>
</div>

<hr class="my-4">
<h5>⚡ Management</h5>
<div class="row mt-3">
<div class="col-md-4">
    <a href="{% url 'manage_users' %}" class="btn btn-primary w-100 p-3">
        👥 Manage Users
    </a>
</div>
<div class="col-md-4">
    <a href="{% url 'manage_posts' %}" class="btn btn-success w-100 p-3">
        📝 Manage Posts
    </a>
</div>
<div class="col-md-4">
    <a href="{% url 'manage_threads' %}" class="btn btn-warning w-100 p-3">
        💬 Manage Threads
    </a>
</div>
</div>
</div>
</div>
{% endblock %}
