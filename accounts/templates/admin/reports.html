{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<h3>🚩 Moderation Queue</h3>

<table class="table">

<tr>
<th>Reporter</th>
<th>Reason</th>
<th>Thread</th>
<th>Action</th>
</tr>

{% for r in reports %}
<tr>
<td>{{ r.reporter }}</td>
<td>{{ r.reason }}</td>
<td>{{ r.thread.title }}</td>

<td>
<a href="#" class="btn btn-success btn-sm">Resolve</a>
</td>

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
