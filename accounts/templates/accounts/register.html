{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-0 fw-bold"><i class="bi bi-person-workspace me-3"></i> Daftar Akun</h3>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Pilih username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Alamat email aktif" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password1" class="form-control" placeholder="Buat password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ulangi Password</label>
                        <input type="password" name="password2" class="form-control" placeholder="Masukkan ulang password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow-sm">Daftar</button>
                </form>
                <div class="mt-3 text-center">
                    <small>Sudah punya akun? <a href="{% url 'login' %}" class="text-decoration-none">Login di sini</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
